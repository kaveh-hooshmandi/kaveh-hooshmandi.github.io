# Site configuration for Dr. Kaveh Hooshmandi
# Academic personal website based on a Jekyll / GitHub Pages template.

# ----------------------------------------------------------------------
# Basic Site Settings
# ----------------------------------------------------------------------
locale                   : "en-Iran"
title                    : "Dr. Kaveh Hooshmandi"
title_separator          : "-"
name                     : &name "Dr. Kaveh Hooshmandi"
description              : &description "Control Systems and Robotics Researcher"
url                      : "https://kaveh-hooshmandi.github.io"
baseurl                  : ""
repository               : "kaveh-hooshmandi/kaveh-hooshmandi.github.io"

# ----------------------------------------------------------------------
# Site Author
# These settings control the author profile shown in the sidebar.
# ----------------------------------------------------------------------
author:
  avatar           : "Profile.jpg"
  name             : "Dr. Kaveh Hooshmandi"
  pronouns         :
  bio              : "Assistant Professor in Control Engineering | Robotics, Automation, ROS2, Sensor Fusion and Autonomous Mobile Robots"
  location         : "Arak, Iran"
  employer         : "Arak University of Technology"
  uri              : "https://kaveh-hooshmandi.github.io"
  orcid            : "https://orcid.org/0000-0003-0732-9215"
  email            : "dk.hooshmandi@gmail.com"

  # Academic profiles
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=7zjCtzcAAAAJ"
  impactstory      :
  orcid            :
  semantic         :
  pubmed           :
  researchgate     :

  # Code and software profiles
  bitbucket        :
  codepen          :
  dribbble         :
  github           : "kaveh-hooshmandi"
  kaggle           :
  stackoverflow    :

  # Social media profiles
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         :
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# ----------------------------------------------------------------------
# Publication Categories
# ----------------------------------------------------------------------
publication_category:
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"
  books:
    title: "Books"
  submitted:
    title: "Submitted Manuscripts"

# ----------------------------------------------------------------------
# General Site Settings
# ----------------------------------------------------------------------
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :

staticman:
  allowedFields          : ["name", "email", "url", "message"]
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : "comment-{@timestamp}"
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ["name", "email", "message"]
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"

atom_feed:
  hide                   : false
  path                   :

# ----------------------------------------------------------------------
# SEO
# ----------------------------------------------------------------------
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

twitter:
  username               :

facebook:
  username               :
  app_id                 :
  publisher              :

og_image                 :

social:
  type                   : "Person"
  name                   : "Dr. Kaveh Hooshmandi"
  links:
    - "https://github.com/kaveh-hooshmandi"
    - "https://scholar.google.com/citations?user=7zjCtzcAAAAJ"

# ----------------------------------------------------------------------
# Analytics
# ----------------------------------------------------------------------
analytics:
  provider               : "false"
  google:
    tracking_id          :

# ----------------------------------------------------------------------
# Reading Files
# ----------------------------------------------------------------------
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ----------------------------------------------------------------------
# Conversion
# ----------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: "lsquo,rsquo,ldquo,rdquo"
  enable_coderay: false

# ----------------------------------------------------------------------
# Collections
# Keep the original collection names so the template does not break.
# ----------------------------------------------------------------------
collections:
  Experiences:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ----------------------------------------------------------------------
# Default Layouts
# ----------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: Experiences
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# ----------------------------------------------------------------------
# Sass / SCSS
# ----------------------------------------------------------------------
sass:
  sass_dir: _sass
  style: compressed

# ----------------------------------------------------------------------
# Output
# ----------------------------------------------------------------------
permalink: /:categories/:title/
timezone: Asia/Tehran

# ----------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# ----------------------------------------------------------------------
# Archives
# ----------------------------------------------------------------------
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# ----------------------------------------------------------------------
# HTML Compression
# ----------------------------------------------------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
